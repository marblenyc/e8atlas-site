<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E8 ATLAS — Coming Soon</title>
<meta name="description" content="A repository of structure. Opening 2026.">
<style>
  :root{
    --bg:            #050912;
    --bg-2:          #0a101c;
    --bg-3:          #0d1522;
    --ivory:         #EDE4CE;
    --ivory-bright:  #F6EFDD;
    --blue-text:     #a8bad4;
    --blue-dim:      #6d7f9a;
    --blue-faint:    #4a5870;
    --platinum:      #c9cfd8;
    --amber:         #d8b878;
    --amber-bright:  #f0d095;

    --serif:  'Cormorant Garamond', 'Playfair Display', Georgia, serif;
    --sans:   'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    --mono:   'IBM Plex Mono', 'Courier New', monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    background:var(--bg);
    color:var(--ivory);
    font-family:var(--sans);
    font-weight:300;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    min-height:100vh;
  }

  /* ═══════════════════════════════════════════════════════════
     COSMIC BACKGROUND — deep space with drifting stars
     ═══════════════════════════════════════════════════════════ */
  .cosmos{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(120,160,210,.10) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(216,184,120,.08) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(140,180,220,.04) 0%, transparent 70%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 50%, var(--bg) 100%);
    overflow:hidden;
  }
  .cosmos::before{
    content:'';
    position:absolute; inset:-50%;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(237,228,206,.6), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(237,228,206,.4), transparent),
      radial-gradient(1px 1px at 40% 50%, rgba(201,207,216,.5), transparent),
      radial-gradient(1px 1px at 80% 10%, rgba(237,228,206,.6), transparent),
      radial-gradient(2px 2px at 15% 60%, rgba(216,184,120,.5), transparent),
      radial-gradient(1px 1px at 90% 40%, rgba(201,207,216,.6), transparent),
      radial-gradient(1px 1px at 33% 85%, rgba(237,228,206,.4), transparent),
      radial-gradient(1px 1px at 70% 30%, rgba(216,184,120,.5), transparent),
      radial-gradient(2px 2px at 50% 15%, rgba(237,228,206,.7), transparent),
      radial-gradient(1px 1px at 10% 40%, rgba(201,207,216,.4), transparent),
      radial-gradient(1px 1px at 85% 75%, rgba(237,228,206,.5), transparent),
      radial-gradient(1px 1px at 25% 10%, rgba(216,184,120,.4), transparent);
    background-size: 800px 800px, 600px 600px, 500px 500px, 700px 700px, 400px 400px,
                     650px 650px, 550px 550px, 750px 750px, 450px 450px, 620px 620px,
                     680px 680px, 720px 720px;
    animation: drift 240s linear infinite;
    opacity:.9;
  }
  @keyframes drift{
    from{ transform:translate(0,0); }
    to{ transform:translate(-100px, -80px); }
  }

  /* Central glow behind the mandala */
  .cosmos::after{
    content:'';
    position:absolute;
    top:50%; left:50%;
    width:900px; height:900px;
    transform:translate(-50%, -50%);
    background:radial-gradient(circle, rgba(120,160,210,.12) 0%, rgba(120,160,210,.04) 30%, transparent 60%);
    filter:blur(40px);
    animation: pulse 8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:.7; transform:translate(-50%, -50%) scale(1); }
    50%{ opacity:1; transform:translate(-50%, -50%) scale(1.05); }
  }

  /* ═══════════════════════════════════════════════════════════
     HAIRLINE FRAME (institutional formality)
     ═══════════════════════════════════════════════════════════ */
  .frame{
    position:fixed;
    inset:24px;
    border:1px solid rgba(201,207,216,.10);
    pointer-events:none;
    z-index:2;
  }
  .frame::before, .frame::after{
    content:'';
    position:absolute;
    width:14px; height:14px;
    border-color:var(--platinum);
    border-style:solid;
    opacity:.4;
  }
  .frame::before{ top:-1px; left:-1px; border-width:1px 0 0 1px; }
  .frame::after{ bottom:-1px; right:-1px; border-width:0 1px 1px 0; }
  .frame-corners{ position:fixed; inset:24px; pointer-events:none; z-index:2; }
  .frame-corners::before, .frame-corners::after{
    content:'';
    position:absolute;
    width:14px; height:14px;
    border-color:var(--platinum);
    border-style:solid;
    opacity:.4;
  }
  .frame-corners::before{ top:-1px; right:-1px; border-width:1px 1px 0 0; }
  .frame-corners::after{ bottom:-1px; left:-1px; border-width:0 0 1px 1px; }

  /* ═══════════════════════════════════════════════════════════
     MAIN STAGE
     ═══════════════════════════════════════════════════════════ */
  .stage{
    position:relative;
    z-index:3;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* Top bar — brand + status */
  .topbar{
    padding:60px 60px 0;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:40px;
  }
  .brand{
    font-family:var(--serif);
    font-weight:500;
    font-size:22px;
    letter-spacing:.04em;
    color:var(--platinum);
    line-height:1;
  }
  .brand em{
    font-style:italic;
    color:var(--ivory-bright);
    margin-right:4px;
  }
  .status-pill{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:8px 14px;
    border:1px solid rgba(216,184,120,.35);
    border-radius:2px;
    background:rgba(216,184,120,.05);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
  }
  .status-dot{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 8px var(--amber);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink{
    0%,100%{ opacity:1; }
    50%{ opacity:.4; }
  }
  .status-text{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--amber);
  }

  /* Central content — mandala + title */
  .center{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 40px 60px;
    text-align:center;
  }

  .mandala-wrap{
    position:relative;
    width:min(560px, 70vw);
    aspect-ratio:1;
    margin-bottom:40px;
    animation: fadeIn 2s ease-out;
  }
  @keyframes fadeIn{
    from{ opacity:0; transform:scale(.9); }
    to{ opacity:1; transform:scale(1); }
  }

  /* Concentric decorative rings around mandala */
  .mandala-wrap::before, .mandala-wrap::after{
    content:'';
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(201,207,216,.10);
    pointer-events:none;
  }
  .mandala-wrap::before{
    inset:-40px;
  }
  .mandala-wrap::after{
    inset:-80px;
    border-color:rgba(201,207,216,.05);
  }

  .mandala-svg{
    width:100%;
    height:100%;
    filter:drop-shadow(0 0 40px rgba(201,207,216,.25))
           drop-shadow(0 0 80px rgba(120,160,210,.15));
    animation: rotate 300s linear infinite;
  }
  @keyframes rotate{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
  }

  /* Wordmark and title stack */
  .titling{
    animation: slideUp 1.6s ease-out .4s backwards;
  }
  @keyframes slideUp{
    from{ opacity:0; transform:translateY(20px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .wordmark{
    font-family:var(--serif);
    font-weight:500;
    font-size:clamp(48px, 8vw, 88px);
    letter-spacing:.06em;
    color:var(--platinum);
    line-height:1;
    text-shadow:0 0 40px rgba(201,207,216,.3);
    margin-bottom:20px;
  }
  .wordmark em{
    font-style:italic;
    color:var(--ivory-bright);
    margin-right:.12em;
  }

  .tagline{
    font-family:var(--serif);
    font-weight:300;
    font-style:italic;
    font-size:clamp(18px, 2.4vw, 26px);
    color:var(--blue-text);
    max-width:600px;
    line-height:1.4;
    margin:0 auto 40px;
  }
  .tagline .em{
    font-style:normal;
    color:var(--ivory);
  }

  /* Divider — hairline platinum with center jewel */
  .divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    margin:0 auto 40px;
    max-width:280px;
    animation: slideUp 1.6s ease-out .8s backwards;
  }
  .divider-line{
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--platinum), transparent);
    opacity:.5;
  }
  .divider-jewel{
    width:8px; height:8px;
    transform:rotate(45deg);
    background:var(--amber);
    box-shadow:0 0 12px var(--amber);
  }

  /* Coming date */
  .coming{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.44em;
    text-transform:uppercase;
    color:var(--amber);
    margin-bottom:60px;
    animation: slideUp 1.6s ease-out 1s backwards;
  }

  /* Notify strip */
  .notify{
    animation: slideUp 1.6s ease-out 1.2s backwards;
  }
  .notify-label{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--blue-dim);
    margin-bottom:16px;
  }
  .notify-form{
    display:inline-flex;
    align-items:stretch;
    background:rgba(20,29,46,.55);
    border:1px solid rgba(201,207,216,.20);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-radius:2px;
    overflow:hidden;
    box-shadow:
      0 0 30px -8px rgba(120,160,210,.2),
      inset 0 1px 0 rgba(255,251,235,.05);
    transition:all .3s ease;
  }
  .notify-form:focus-within{
    border-color:rgba(216,184,120,.5);
    box-shadow:
      0 0 40px -6px rgba(216,184,120,.3),
      inset 0 1px 0 rgba(255,251,235,.08);
  }
  .notify-input{
    background:transparent;
    border:none;
    outline:none;
    padding:14px 20px;
    color:var(--ivory);
    font-family:var(--sans);
    font-size:14px;
    letter-spacing:.02em;
    width:300px;
  }
  .notify-input::placeholder{
    color:var(--blue-dim);
    font-style:italic;
    font-family:var(--serif);
  }
  .notify-submit{
    background:transparent;
    border:none;
    border-left:1px solid rgba(201,207,216,.15);
    padding:14px 24px;
    color:var(--amber);
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.28em;
    text-transform:uppercase;
    cursor:pointer;
    transition:background .3s ease, color .3s ease;
  }
  .notify-submit:hover{
    background:rgba(216,184,120,.08);
    color:var(--amber-bright);
  }

  /* Footer strip */
  .footer{
    padding:0 60px 40px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:20px;
  }
  .footer-note{
    font-family:var(--serif);
    font-style:italic;
    font-size:13px;
    color:var(--blue-dim);
  }
  .footer-meta{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--blue-dim);
  }

  /* ═══════════════════════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════════════════════ */
  @media (max-width:800px){
    .frame, .frame-corners{ inset:12px; }
    .topbar{ padding:32px 24px 0; flex-wrap:wrap; gap:16px; }
    .center{ padding:20px 20px 40px; }
    .mandala-wrap::before{ inset:-20px; }
    .mandala-wrap::after{ inset:-40px; }
    .notify-input{ width:220px; padding:12px 16px; }
    .notify-submit{ padding:12px 18px; }
    .footer{ padding:0 24px 24px; flex-wrap:wrap; }
  }
  @media (max-width:480px){
    .notify-form{ flex-direction:column; }
    .notify-input{ width:100%; }
    .notify-submit{ border-left:none; border-top:1px solid rgba(201,207,216,.15); }
  }

  /* Reduce motion for accessibility */
  @media (prefers-reduced-motion: reduce){
    .cosmos::before, .cosmos::after, .mandala-svg,
    .titling, .divider, .coming, .notify, .status-dot{
      animation:none;
    }
  }
</style>
</head>
<body>

<div class="cosmos"></div>
<div class="frame"></div>
<div class="frame-corners"></div>

<div class="stage">

  <div class="topbar">
    <div class="brand"><em>E8</em>ATLAS</div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <div class="status-text">Volume I · In Preparation</div>
    </div>
  </div>

  <div class="center">

    <div class="mandala-wrap">
      <svg class="mandala-svg" viewBox="-280 -280 560 560" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#F6EFDD" stop-opacity=".18"/>
            <stop offset="50%" stop-color="#c9cfd8" stop-opacity=".05"/>
            <stop offset="100%" stop-color="#c9cfd8" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="vertexGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#F6EFDD" stop-opacity="1"/>
            <stop offset="60%" stop-color="#EDE4CE" stop-opacity=".8"/>
            <stop offset="100%" stop-color="#EDE4CE" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="0" cy="0" r="260" fill="url(#centerGlow)"/>
        <g id="e8-mandala" fill="none"></g>
      </svg>
    </div>

    <div class="titling">
      <h1 class="wordmark"><em>E8</em>ATLAS</h1>
      <p class="tagline">
        A repository of <span class="em">structure</span> — the geometry of a single extraordinary object, held quietly and kept openly.
      </p>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-jewel"></div>
      <div class="divider-line"></div>
    </div>

    <div class="coming">Opening Soon</div>

    <div class="notify">
      <div class="notify-label">Word will be sent when the doors open</div>
      <form class="notify-form" onsubmit="return handleNotify(event)">
        <input type="email" class="notify-input" name="email" placeholder="Your email" required aria-label="Email address">
        <button type="submit" class="notify-submit">Notify Me →</button>
      </form>
    </div>

  </div>

  <div class="footer">
    <div class="footer-note">A private undertaking · Free to read on arrival</div>
    <div class="footer-meta">MMXXVI</div>
  </div>

</div>

<script>
// ── Draw the E8 Coxeter mandala ──
(function(){
  const svg = document.getElementById('e8-mandala');
  if(!svg) return;
  const svgNS = 'http://www.w3.org/2000/svg';

  const rings = [
    {r: 34,  n: 30, offset: 0,  ptOp:.95, ptR:1.8, lineOp:.4},
    {r: 68,  n: 30, offset: 6,  ptOp:.90, ptR:1.7, lineOp:.35},
    {r: 104, n: 30, offset: 0,  ptOp:.95, ptR:1.9, lineOp:.4},
    {r: 142, n: 30, offset: 6,  ptOp:1.0, ptR:2.0, lineOp:.5},
    {r: 180, n: 30, offset: 0,  ptOp:.95, ptR:1.9, lineOp:.45},
    {r: 214, n: 30, offset: 6,  ptOp:.85, ptR:1.7, lineOp:.35},
    {r: 240, n: 30, offset: 0,  ptOp:.75, ptR:1.5, lineOp:.28},
    {r: 258, n: 30, offset: 6,  ptOp:.65, ptR:1.3, lineOp:.22}
  ];

  const pts = [];

  // Guide circles for each ring (very faint)
  rings.forEach(ring => {
    const c = document.createElementNS(svgNS, 'circle');
    c.setAttribute('cx', 0); c.setAttribute('cy', 0);
    c.setAttribute('r', ring.r);
    c.setAttribute('stroke', '#c9cfd8');
    c.setAttribute('stroke-width', '.3');
    c.setAttribute('stroke-opacity', '.08');
    c.setAttribute('fill', 'none');
    svg.appendChild(c);
  });

  // Vertices
  rings.forEach((ring, ri) => {
    const g = document.createElementNS(svgNS, 'g');
    for(let i=0; i<ring.n; i++){
      const angle = ((i * 360 / ring.n) + ring.offset) * Math.PI/180;
      const x = Math.cos(angle) * ring.r;
      const y = Math.sin(angle) * ring.r;
      pts.push({x, y, ring: ri, angle});

      // Glow halo
      const halo = document.createElementNS(svgNS, 'circle');
      halo.setAttribute('cx', x); halo.setAttribute('cy', y);
      halo.setAttribute('r', ring.ptR * 2.5);
      halo.setAttribute('fill', 'url(#vertexGlow)');
      halo.setAttribute('opacity', '.5');
      g.appendChild(halo);

      // Bright center
      const c = document.createElementNS(svgNS, 'circle');
      c.setAttribute('cx', x); c.setAttribute('cy', y);
      c.setAttribute('r', ring.ptR);
      c.setAttribute('fill', '#F6EFDD');
      c.setAttribute('fill-opacity', ring.ptOp);
      g.appendChild(c);
    }
    svg.appendChild(g);
  });

  // Edges — nearest neighbors
  const edgeG = document.createElementNS(svgNS, 'g');
  edgeG.setAttribute('stroke', '#c9cfd8');
  edgeG.setAttribute('stroke-width', '.4');
  edgeG.setAttribute('fill', 'none');

  for(let i=0; i<pts.length; i++){
    const distances = [];
    for(let j=0; j<pts.length; j++){
      if(i===j) continue;
      const dx = pts[i].x - pts[j].x;
      const dy = pts[i].y - pts[j].y;
      distances.push({j, d: Math.sqrt(dx*dx + dy*dy)});
    }
    distances.sort((a,b) => a.d - b.d);
    for(let k=0; k<3; k++){
      if(k >= distances.length) break;
      if(distances[k].d > 65) continue;
      const j = distances[k].j;
      if(j < i) continue;
      const line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', pts[i].x); line.setAttribute('y1', pts[i].y);
      line.setAttribute('x2', pts[j].x); line.setAttribute('y2', pts[j].y);
      line.setAttribute('stroke-opacity', .22);
      edgeG.appendChild(line);
    }
  }
  // Insert edges BEFORE vertices so vertices sit on top
  svg.insertBefore(edgeG, svg.children[rings.length]);

  // Center jewel
  const centerJewel = document.createElementNS(svgNS, 'g');
  const jewelHalo = document.createElementNS(svgNS, 'circle');
  jewelHalo.setAttribute('cx', 0); jewelHalo.setAttribute('cy', 0);
  jewelHalo.setAttribute('r', 12);
  jewelHalo.setAttribute('fill', 'url(#vertexGlow)');
  jewelHalo.setAttribute('opacity', '.9');
  centerJewel.appendChild(jewelHalo);

  const jewel = document.createElementNS(svgNS, 'circle');
  jewel.setAttribute('cx', 0); jewel.setAttribute('cy', 0);
  jewel.setAttribute('r', 3);
  jewel.setAttribute('fill', '#F6EFDD');
  centerJewel.appendChild(jewel);

  svg.appendChild(centerJewel);
})();

// ── Notify form ──
function handleNotify(e){
  e.preventDefault();
  const form = e.target;
  const email = form.email.value;
  const btn = form.querySelector('.notify-submit');

  // Try to store locally (may fail in some contexts — degrade gracefully)
  try {
    const key = 'e8atlas_notify_pending';
    localStorage.setItem(key, email);
  } catch(_){}

  // Visual feedback
  btn.textContent = 'Received ✓';
  btn.style.color = 'var(--ivory-bright)';
  form.style.borderColor = 'rgba(216,184,120,.6)';
  form.querySelector('.notify-input').value = '';
  form.querySelector('.notify-input').placeholder = 'Word is on its way';

  setTimeout(() => {
    btn.textContent = 'Notify Me →';
    btn.style.color = '';
  }, 3200);

  return false;
}
</script>

</body>
</html>
