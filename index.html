<html lang="en">

<style>
  :root{
    --serif:'Cormorant Garamond','Playfair Display',Georgia,serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#070C18;color:#FFF6D8;font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;overflow:hidden;}

  /* ONE SCREEN. svh is the visible viewport on real devices (it excludes the mobile
     browser's dynamic toolbar); vh is the fallback for engines without svh. No min-height
     floor — the hero is exactly one screen and can never exceed the viewport. */
  #lattice-hero{position:relative;width:100%;height:100vh;height:100svh;background:#070C18;overflow:hidden;}
  #lattice-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .lattice-fallback-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}

  .lattice-overlay{position:absolute;left:0;right:0;bottom:0;padding:0 40px 64px;pointer-events:none;z-index:2;text-align:center;}
  .lattice-word{font-family:var(--serif);font-weight:500;font-size:clamp(34px,6vw,68px);letter-spacing:.05em;color:#FFF6D8;text-shadow:0 0 38px rgba(176,141,87,.35);line-height:1;}
  .lattice-word .e8{font-style:italic;color:#E9C87A;}
  .lattice-sub{margin-top:11px;font-family:var(--sans);font-weight:300;font-size:clamp(11px,1.6vw,15px);letter-spacing:.26em;text-transform:uppercase;color:#b7a079;}
  .lattice-cta{display:inline-block;margin-top:22px;pointer-events:auto;font-family:var(--sans);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#E9C87A;text-decoration:none;border:1px solid rgba(176,141,87,.55);border-radius:7px;padding:11px 20px;background:rgba(7,12,24,.4);transition:color .2s ease,background .2s ease;}
  .lattice-cta:hover{color:#070C18;background:#E9C87A;border-color:#E9C87A;}

  .view-switch{position:absolute;left:0;right:0;top:26px;display:flex;justify-content:center;z-index:3;pointer-events:none;}
  .vs-pill{display:inline-flex;gap:4px;padding:5px;border-radius:999px;background:rgba(7,12,24,.55);border:1px solid rgba(176,141,87,.28);pointer-events:auto;}
  .vs-btn{width:46px;height:34px;display:flex;align-items:center;justify-content:center;border:none;border-radius:999px;background:transparent;cursor:pointer;transition:background .2s ease;}
  .vs-btn svg{width:23px;height:23px;fill:none;stroke:rgba(201,180,130,.6);stroke-width:1.4;}
  .vs-btn.is-active{background:rgba(233,200,122,.16);}
  .vs-btn.is-active svg{stroke:#E9C87A;}
  .vs-btn:hover svg{stroke:#FFF6D8;}

  @media(max-width:480px){.lattice-overlay{padding:0 20px 50px;}.view-switch{top:16px;}}
</style>
</head>
<body>

<!-- ===== ONE SCREEN — the live E8 root system, autorotating, and the way in. Nothing below. ===== -->
<section id="lattice-hero" aria-label="The E8 root system, a live Coxeter-plane projection">
  <canvas id="lattice-canvas"></canvas>
  <noscript><img src="/og-lattice.png" alt="The E8 root system — 240 roots projected on the Coxeter plane" class="lattice-fallback-img"></noscript>
  <div class="view-switch" role="group" aria-label="Choose flat or three-dimensional view">
    <div class="vs-pill">
      <button class="vs-btn is-active" data-mode="2d" aria-label="Flat view" title="Flat view">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.4"/></svg>
      </button>
      <button class="vs-btn" data-mode="3d" aria-label="Three-dimensional view" title="3D view">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><ellipse cx="12" cy="12" rx="8.5" ry="3.4"/><ellipse cx="12" cy="12" rx="3.4" ry="8.5"/></svg>
      </button>
    </div>
  </div>
  <div class="lattice-overlay">
    <div class="lattice-word"><span class="e8">E8</span> Atlas</div>
    <div class="lattice-sub">A Repository of Structure</div>
    <a class="lattice-cta" href="/atlas/">Enter the atlas →</a>
  </div>
</section>
<script src="/lattice-core.js"></script>
<script src="/lattice-draw.js"></script>
<script src="/e8-kernel.js"></script>
<script src="/e8-kernel-l2.js"></script>
<script>
/* Apex hero: 2D default (existing path, unchanged geometry) + a 3D view READ FROM THE L2
   REGISTRY (E8L2.project('coxeter-3d')) — no three.js, a 2D canvas with z used for depth sort
   + cueing. Both branches share the GOLD palette so the toggle never changes sites.
   Autorotate on load. Any failure -> the static plate. */
(function(){
  var host=document.getElementById('lattice-hero'), cv=document.getElementById('lattice-canvas');
  function fallback(){ try{ if(cv&&cv.parentNode){ var img=new Image(); img.src='/og-lattice.png';
    img.alt='The E8 root system — Coxeter projection'; img.className='lattice-fallback-img';
    cv.parentNode.replaceChild(img,cv);} }catch(e){} }
  try{
    if(!cv||!window.LatticeCore||!window.drawLattice||!cv.getContext) return fallback();
    var ctx=cv.getContext('2d'); if(!ctx) return fallback();
    var core=window.LatticeCore, dpr=Math.min(window.devicePixelRatio||1,2), W=1,H=1;
    function resize(){ var r=host.getBoundingClientRect(); W=Math.max(1,r.width|0); H=Math.max(1,r.height|0);
      cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
    resize();
    var A0=0.19, SPEED=0.06, mode='2d';

    /* ---- 3D path: the projection is READ from L2, never authored here. GOLD palette, matched to 2D. ---- */
    var D=null;
    function pc(t){ var a=[255,246,216],b=[233,200,122],c=[176,141,87],x,y,f;   /* gold field grade */
      if(t<0.5){x=a;y=b;f=t/0.5;}else{x=b;y=c;f=(t-0.5)/0.5;}
      return Math.round(x[0]+(y[0]-x[0])*f)+','+Math.round(x[1]+(y[1]-x[1])*f)+','+Math.round(x[2]+(y[2]-x[2])*f); }
    function acc3(i){ if(i%23!==0)return null; return ((i/23|0)%2)?'224,138,106':'90,166,255'; } /* sparse blue/orange markers */
    function get3D(){ if(D)return D; if(!window.E8||!window.E8L2)return null;
      var P=window.E8L2.project('coxeter-3d'), R=window.E8.roots(), E=[], i, j;
      for(i=0;i<240;i++)for(j=i+1;j<240;j++) if(window.E8.inner(R[i],R[j])===1) E.push([i,j]);
      var r2=[], r2max=0, ext=0;
      for(i=0;i<240;i++){ var rr=Math.hypot(P[i].x,P[i].y); r2.push(rr); if(rr>r2max)r2max=rr;
        var e=Math.hypot(P[i].x,P[i].y,P[i].z); if(e>ext)ext=e; }
      D={P:P,E:E,r2:r2,r2max:r2max,ext:ext}; return D; }
    function draw3D(angle){
      var d=get3D(); if(!d){ window.drawLattice(ctx,W,H,angle,core,{bg:true,dpr:dpr}); return; } /* kernel absent -> 2D */
      var cx=W/2, cy=H/2, scale=Math.min(W,H)*0.42/d.ext;
      var ca=Math.cos(angle), sa=Math.sin(angle), tilt=0.5, ct=Math.cos(tilt), st=Math.sin(tilt);
      var g=ctx.createRadialGradient(cx,cy*0.92,0,cx,cy,Math.max(W,H)*0.72);
      g.addColorStop(0,'#0b1120'); g.addColorStop(0.55,'#070C18'); g.addColorStop(1,'#04060d');   /* near-black, matches 2D */
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      var sx=new Array(240), sy=new Array(240), sz=new Array(240), i;
      for(i=0;i<240;i++){ var x=d.P[i].x,y=d.P[i].y,z=d.P[i].z;
        var x1=x*ca+z*sa, z1=-x*sa+z*ca, y1=y;              /* spin about Y (view transform of the cloud) */
        var y2=y1*ct - z1*st, z2=y1*st + z1*ct;             /* fixed tilt about X for a readable angle */
        sx[i]=cx+x1*scale; sy[i]=cy - y2*scale; sz[i]=z2; }
      var zmin=Infinity,zmax=-Infinity;
      for(i=0;i<240;i++){ if(sz[i]<zmin)zmin=sz[i]; if(sz[i]>zmax)zmax=sz[i]; }
      var zr=(zmax-zmin)||1;
      ctx.globalCompositeOperation='lighter';
      /* edges: one batched path (fast), faint additive gold web */
      ctx.strokeStyle='rgba(176,141,87,0.045)'; ctx.lineWidth=Math.max(0.4,dpr*0.5); ctx.beginPath();
      for(i=0;i<d.E.length;i++){ var a2=d.E[i][0], b2=d.E[i][1]; ctx.moveTo(sx[a2],sy[a2]); ctx.lineTo(sx[b2],sy[b2]); }
      ctx.stroke();
      /* points: sorted back-to-front; near = larger+brighter, far = smaller+dimmer. Gold + sparse markers. */
      var ord=[]; for(i=0;i<240;i++)ord.push(i); ord.sort(function(p,q){return sz[p]-sz[q];});
      for(var o=0;o<240;o++){ i=ord[o];
        var td=(sz[i]-zmin)/zr, aC=acc3(i), col=aC||pc(d.r2[i]/d.r2max);
        var rad=(1.0+1.7*td)*dpr*(aC?1.15:1), al=(0.30+0.70*td);
        ctx.fillStyle='rgba('+col+','+(al*0.12).toFixed(3)+')'; ctx.beginPath(); ctx.arc(sx[i],sy[i],rad*2.4,0,6.283185); ctx.fill();
        ctx.fillStyle='rgba('+col+','+al.toFixed(3)+')';     ctx.beginPath(); ctx.arc(sx[i],sy[i],rad,0,6.283185); ctx.fill(); }
      ctx.globalCompositeOperation='source-over';
    }

    /* 2D branch is the EXACT original call — geometry byte-identical, only the palette changed */
    function draw(angle){ if(mode==='3d'){ draw3D(angle); } else { window.drawLattice(ctx,W,H,angle,core,{bg:true,dpr:dpr}); } }

    draw(A0); /* first paint — 2D default, object present within ms */
    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var start=null;
    if(!reduce){ (function frame(t){ if(start===null)start=t; draw(A0+(t-start)/1000*SPEED); requestAnimationFrame(frame); })(performance.now()); }
    var rt; window.addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(function(){ resize(); if(reduce) draw(A0); },150); });

    /* view switch — flip mode; 2D stays the default and the known-good spectacle */
    var btns=host.querySelectorAll('.vs-btn');
    for(var b=0;b<btns.length;b++){ (function(btn){ btn.addEventListener('click',function(){
      mode=btn.getAttribute('data-mode');
      for(var k=0;k<btns.length;k++) btns[k].classList.toggle('is-active', btns[k]===btn);
      if(reduce) draw(A0);
    }); })(btns[b]); }
  }catch(e){ fallback(); }
})();
</script>

</body>
</html>
