<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E8 Atlas · Not Found</title>
<style>
  :root{
    --bg:            #0a101c;
    --panel:         #131c2c;
    --line:          rgba(180,196,220,.14);
    --ivory:         #EDE4CE;
    --ivory-bright:  #F6EFDD;
    --blue-text:     #a8bad4;
    --amber:         #d8b878;
    --serif:  'Cormorant Garamond','Playfair Display',Georgia,serif;
    --sans:   'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    --mono:   'IBM Plex Mono','Courier New',monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--bg); color:var(--ivory);
    font-family:var(--sans);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:40px 24px; text-align:center;
    background-image:radial-gradient(ellipse 60% 55% at 50% 42%, rgba(216,184,120,.06), transparent 70%);
  }
  .wrap{ max-width:560px; }
  .mandala{ width:74px; height:74px; margin:0 auto 34px; display:block; opacity:.9; }
  .brand{
    font-family:var(--mono); font-size:11px; letter-spacing:.28em;
    text-transform:uppercase; color:var(--amber); margin-bottom:26px;
  }
  .brand b{ color:var(--ivory); font-weight:500; }
  .brand .sep{ color:var(--blue-text); opacity:.55; margin:0 9px; }
  .code{
    font-family:var(--serif); font-weight:400; font-size:88px; line-height:1;
    color:var(--ivory-bright); margin:0 0 14px; letter-spacing:.01em;
  }
  h1{
    font-family:var(--serif); font-weight:400; font-size:30px; line-height:1.2;
    color:var(--ivory-bright); margin:0 0 18px;
  }
  h1 em{ font-style:italic; color:var(--blue-text); }
  p.lede{
    font-family:var(--serif); font-weight:300; font-size:18px; line-height:1.55;
    color:var(--blue-text); max-width:440px; margin:0 auto 34px;
  }
  a.home{
    display:inline-block; font-family:var(--sans); font-size:12px;
    letter-spacing:.16em; text-transform:uppercase; color:var(--amber);
    text-decoration:none; padding:12px 22px;
    border:1px solid rgba(216,184,120,.55); border-radius:8px;
    background:var(--panel); transition:color .2s ease, border-color .2s ease;
  }
  a.home:hover{ color:var(--ivory-bright); border-color:var(--amber); }
  .foot{
    margin-top:46px; font-family:var(--mono); font-size:9px;
    letter-spacing:.22em; text-transform:uppercase; color:var(--blue-text); opacity:.5;
  }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="mandala" viewBox="0 0 100 100" aria-hidden="true">
      <g fill="none" stroke="#d8b878" stroke-width="1.2">
        <circle cx="50" cy="50" r="34" opacity=".85"/>
        <circle cx="50" cy="50" r="23" opacity=".5"/>
        <circle cx="50" cy="50" r="12" opacity=".32"/>
        <g opacity=".8">
          <line x1="50" y1="6" x2="50" y2="94"/>
          <line x1="6" y1="50" x2="94" y2="50"/>
          <line x1="20" y1="20" x2="80" y2="80"/>
          <line x1="80" y1="20" x2="20" y2="80"/>
        </g>
        <g stroke="#EDE4CE" opacity=".85">
          <circle cx="50" cy="16" r="2.4" fill="#EDE4CE"/>
          <circle cx="50" cy="84" r="2.4" fill="#EDE4CE"/>
          <circle cx="16" cy="50" r="2.4" fill="#EDE4CE"/>
          <circle cx="84" cy="50" r="2.4" fill="#EDE4CE"/>
        </g>
      </g>
    </svg>
    <div class="brand"><b>E8&nbsp;Atlas</b><span class="sep">·</span>A Repository of Structure</div>
    <div class="code">404</div>
    <h1>This coordinate holds <em>nothing</em>.</h1>
    <p class="lede">The address you reached is not part of the atlas. Every structure here is reachable — but not from this path.</p>
    <a class="home" href="/">↩ Return to the Atlas</a>
    <div class="foot">E8 Atlas · derived &amp; verified · not a faked image</div>
  </div>
</body>
</html>
